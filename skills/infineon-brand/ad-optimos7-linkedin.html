<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infineon OptiMOS™ 7 — LinkedIn Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;400;600;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:     #0a8276;
      --teal-dk:  #08665c;
      --black:    #1d1d1d;
      --white:    #ffffff;
      --font: "Source Sans 3", Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #d0d0d0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font);
    }

    /* ── Ad canvas: 600 × 600 ── */
    .ad {
      position: relative;
      width: 600px;
      height: 600px;
      overflow: hidden;
      background: var(--white);
    }

    /* ── Photo zone: top 55% of canvas, clean photography only ──
       Rule: always use _rgb / clean image assets — no video thumbnails,
       no images with baked-in text or play icons. */
    .photo-zone {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      background-image: url("https://assets.infineon.com/is/image/infineon/carpenter-using-a-jigsaw.jpeg?wid=1200&hei=660&fmt=jpeg&fit=crop");
      background-size: cover;
      background-position: center 40%;
    }

    /* ── Teal panel: occupies bottom 55%, diagonal cut removes top-left corner.
       clip-path points: top-left at 18% down, top-right at 0% → full right edge → full bottom.
       Diagonal goes from upper-right to lower-left (\ direction, matching Infineon reference ads).
       Text zone begins safely below the diagonal — never place text in the clipped corner. ── */
    .teal-zone {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: var(--teal);
      clip-path: polygon(0 18%, 100% 0%, 100% 100%, 0 100%);
    }

    /* ── Content layer sits above both zones ── */
    .ad-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Logo: never on a photo — always in the teal panel, bottom-right, white version */
    .ad-top {
      flex: 1; /* spacer to push ad-bottom down */
    }

    /* ── Text zone: anchored to bottom, padded to stay safely inside teal panel.
       Left padding is intentionally generous (40px) to clear the diagonal edge. ── */
    .ad-bottom {
      padding: 0 28px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .logo-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .logo-row svg {
      height: 22px;
      width: auto;
    }

    .overline {
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 0;
    }

    /* Headline: Regular 400, larger size — Infineon uses size not weight for hierarchy */
    h1 {
      font-weight: 400;
      font-size: 36px;
      line-height: 1.1;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .specs {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 2px;
    }

    .spec-row {
      display: flex;
      align-items: baseline;
      gap: 9px;
    }

    .spec-dot {
      width: 4px;
      height: 4px;
      background: var(--white);
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      top: -1px;
    }

    .spec-text {
      font-weight: 400;
      font-size: 13px;
      color: var(--white);
      line-height: 1.4;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
      font-size: 13px;
      color: var(--white);
      text-decoration: none;
      margin-top: 4px;
      border-bottom: 1.5px solid var(--white);
      padding-bottom: 1px;
      width: fit-content;
    }
  </style>
</head>
